name: Deploy Code from S3 to EC2  
on: 
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest

    # This is crucial - it allows the action to get temporary credentials
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::226290659649:role/s3_connectgithub
        aws-region: us-east-1

    - name: Upload files to S3
      run: |
        aws s3 cp ./index.html s3://s3galle/


  deploy:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH and Role Access  
        uses: appleboy/ssh-action@master
        with:
          host: 13.219.96.18    
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Sync code from S3 to local folder
            # The EC2 instance automatically uses its attached IAM Role
            aws s3 sync s3://s3galle/ /var/www/example.com/ --delete
            
